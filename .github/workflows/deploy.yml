name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FRONTEND_USER_IMAGE_NAME: ${{ github.repository }}-frontend-user
  FRONTEND_ADMIN_IMAGE_NAME: ${{ github.repository }}-frontend-admin

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, xml, curl
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: ./vendor/bin/pest

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-user image
        uses: docker/build-push-action@v5
        with:
          context: ./kidelya-user
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_USER_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_USER_IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://${{ secrets.VPS_HOST }}/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-admin image
        uses: docker/build-push-action@v5
        with:
          context: ./kidelya-admin
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_ADMIN_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_ADMIN_IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://${{ secrets.VPS_HOST }}/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/kidelya

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          FRONTEND_USER_IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_USER_IMAGE_NAME }}:latest
          FRONTEND_ADMIN_IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_ADMIN_IMAGE_NAME }}:latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKER_IMAGE,FRONTEND_USER_IMAGE,FRONTEND_ADMIN_IMAGE,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            echo $GITHUB_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
            cd /opt/kidelya
            DOCKER_IMAGE=$DOCKER_IMAGE FRONTEND_USER_IMAGE=$FRONTEND_USER_IMAGE FRONTEND_ADMIN_IMAGE=$FRONTEND_ADMIN_IMAGE docker compose -f docker-compose.prod.yml pull
            DOCKER_IMAGE=$DOCKER_IMAGE FRONTEND_USER_IMAGE=$FRONTEND_USER_IMAGE FRONTEND_ADMIN_IMAGE=$FRONTEND_ADMIN_IMAGE docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            docker image prune -f
